<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LALG Scanner</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>LALG Scanner</h1>
                <p>Ambiente de Desenvolvimento</p>
            </div>
        </header>

        <main>
            <div class="editor-section">
                <div class="editor-header">
                    <span>Editor de Código</span>
                    <div style="display:flex; gap: 0.5rem;">
                        <button id="btn-scan">Analisar Léxico</button>
                    </div>
                </div>
                <textarea id="source-code" spellcheck="false" placeholder="// código LALG...">program meuteste ;
var
  var_id : int ;
  outro_id : int ;
begin
  var_id := 10 ;
  outro_id := 20 ;
end .</textarea>
            </div>

            <div class="output-section">
                <div class="output-header">
                    <div style="display:flex; gap:0.5rem;" class="output-tabs">
                        <button id="tab-tokens" class="tab-btn active">Lista de Tokens</button>
                        <button id="tab-symbols" class="tab-btn">Tabela de Símbolos</button>
                    </div>
                    <span id="token-count" class="badge">0 tokens</span>
                </div>
                <div class="table-container" id="tokens-container">
                    <table id="tokens-table">
                        <thead>
                            <tr>
                                <th>Ln</th>
                                <th>Lexema</th>
                                <th style="text-align: right;">Categoria</th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>
                
                <div class="table-container" id="symbols-container" style="display:none;">
                    <table id="symbols-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Símbolo</th>
                                <th>Tipo</th>
                                <th>Categoria</th>
                                <th>Valor</th>
                                <th>Usada</th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="error-section" id="error-container" style="display: none;">
                <div class="error-header">
                    <span>Erros Encontrados</span>
                </div>
                <ul id="error-list">
                </ul>
            </div>

            <div class="syntax-section" style="grid-column: 1 / -1; display: flex; flex-direction: column; border: 1px solid var(--border); background-color: var(--bg-secondary);">
                <div class="editor-header">
                    <span>Análise Sintática</span>
                    <div style="display:flex; gap: 0.5rem;">
                        <button id="btn-parse-start">Começar</button>
                        <button id="btn-parse-pause" style="display: none; background-color: #f59e0b; color: #000;">Pausar</button>
                        <button id="btn-parse-step">Passo a Passo</button>
                        <button id="btn-parse-run">Executar Tudo</button>
                        <button id="btn-toggle-tree" style="background-color: #2563eb; color: white; display: inline-block;">Mostrar Árvore</button>
                    </div>
                </div>
                <div class="syntax-viewers" id="syntax-viewers" style="margin-top: 0; padding: 1rem; border-top: none;">
                    <div class="viewer-card">
                        <div class="viewer-header">Pilha de Símbolos</div>
                        <div class="stack-view" id="stack-view">
                        </div>
                    </div>

                    <div class="viewer-card">
                        <div class="viewer-header">Entrada Restante</div>
                        <div class="input-stream" id="input-stream">
                        </div>
                    </div>

                    <div class="viewer-card">
                        <div class="viewer-header">Log de Derivações</div>
                        <ul class="derivation-log" id="derivation-log">
                        </ul>
                    </div>
                </div>
                
                <div class="viewer-card" id="tree-container" style="display: none; height: 500px; width: 100%; border-top: 1px solid var(--border);">
                    <div class="viewer-header">Árvore de Derivação (Zoom / Pan)</div>
                    <svg id="parse-tree-svg" style="width: 100%; height: 100%;"></svg>
                </div>
            </div>
        </main>
    </div>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
